<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Net Logger</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="shell">
    <header class="hero">
      <div class="hero-brand">
        <img class="app-logo" src="/app-logo.png" alt="Net Logger logo" width="96" height="96">
        <div>
          <div class="eyebrow-row">
            <p class="eyebrow">Amateur Radio</p>
            <nav class="header-links" aria-label="Documentation links">
              <a href="/user-guide.html" target="_blank" rel="noopener">User Docs</a>
              <a href="/api/docs" target="_blank" rel="noopener">API Docs</a>
            </nav>
          </div>
          <h1>Net Logger</h1>
          <p class="muted">Known stations → checked in. Traffic and notes stay on each station card.</p>
        </div>
      </div>
      <form id="sessionForm" class="session-form">
        <label>Net name <input id="netName" list="netNameSuggestions" value="Weekly Net"><datalist id="netNameSuggestions"></datalist><select id="netNamePreset" aria-label="Previous net names"><option value="">Previous nets…</option></select></label>
        <label>Frequency <input id="frequency" list="frequencySuggestions" placeholder="146.520 MHz"><datalist id="frequencySuggestions"></datalist><select id="frequencyPreset" aria-label="Previous frequencies"><option value="">Previous frequencies…</option></select></label>
        <label>Net control <input id="netControl" placeholder="Your call"></label>
        <div class="session-buttons">
          <button type="submit" id="startNetBtn">Start Net</button>
          <button type="button" id="stopNetBtn" class="secondary danger" disabled>Stop Net</button>
          <button type="button" id="cancelNetBtn" class="secondary danger" disabled>Cancel Net</button>
          <button type="button" id="clearNetBtn" class="secondary" hidden>Clear Net</button>
        </div>
      </form>
    </header>

    <section class="toolbar">
      <form id="stationLookupForm" class="station-lookup-form">
        <label class="search">Search or add station
          <input id="stationLookup" placeholder="Callsign or name" autocomplete="off" required>
        </label>
        <button type="submit">Find / Check in</button>
      </form>
      <span id="status" class="status">No session started.</span>
      <div class="fcc-tools" aria-label="FCC database tools">
        <span id="fccStatus" class="fcc-status">FCC database: checking…</span>
        <button type="button" id="updateFccBtn" class="secondary">Update FCC Database</button>
      </div>
    </section>

    <section class="board" aria-label="Active net board">
      <div class="column drop-target" id="knownDropZone">
        <div class="column-title"><h2>Known Stations</h2><span id="knownCount">0</span></div>
        <div id="knownStations" class="card-list" aria-label="Known stations"></div>
      </div>
      <div class="column drop-target" id="checkedInDropZone">
        <div class="column-title"><h2>Checked In</h2><span id="checkinCount">0</span></div>
        <div id="checkins" class="card-list" aria-label="Checked in stations"></div>
      </div>
    </section>

    <section class="lower-grid">
      <section class="panel">
        <div class="panel-title">
          <h2>Saved Nets</h2>
          <a class="button-link" href="/api/export.csv">Export all nets CSV</a>
        </div>
        <div id="sessionsList" class="sessions-list"></div>
      </section>

      <section class="panel">
        <div class="panel-title">
          <h2>Metrics</h2>
          <div class="metrics-controls">
            <label>Summary
              <select id="metricsPeriod">
                <option value="week">Week</option>
                <option value="month" selected>Month</option>
                <option value="year">Year</option>
              </select>
            </label>
            <label>Net name
              <select id="metricsNetName">
                <option value="">All nets</option>
              </select>
            </label>
            <button type="button" class="secondary" id="refreshMetricsBtn">Refresh</button>
          </div>
        </div>
        <p class="muted">Check-ins by net, grouped by the selected period.</p>
        <div id="metricsSeriesByNet" class="metrics-series"></div>
      </section>
    </section>
  </main>
  <script src="/app.js"></script>
</body>
</html>
