name: Build Windows Installer

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  windows-installer:
    name: Windows installer
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install '.[dev]' pyinstaller

      - name: Run tests
        shell: pwsh
        run: pytest

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --yes --no-progress

      - name: Build PyInstaller executable
        shell: pwsh
        run: pyinstaller packaging/windows/net-logger.spec --noconfirm --clean

      - name: Build Inno Setup installer
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            $iscc = "${env:ProgramFiles}\Inno Setup 6\ISCC.exe"
          }
          & $iscc packaging\windows\net-logger.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: net-logger-windows-installer
          path: dist/installer/NetLoggerSetup-*.exe
          if-no-files-found: error

      - name: Attach installer to GitHub Release
        if: github.event_name == 'release'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $installer = Get-ChildItem dist/installer/NetLoggerSetup-*.exe | Select-Object -First 1
          if (-not $installer) { throw "No installer found in dist/installer" }
          gh release upload "${{ github.event.release.tag_name }}" $installer.FullName --clobber
